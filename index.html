<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Go to Link</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f4f4f4;
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 500px;
      background: #fff;
      padding: 20px;
      border-radius: 16px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
    }

    .input-group {
      display: flex;
      gap: 10px;
    }

    input {
      flex: 1;
      min-width: 0;
      padding: 14px 16px;
      font-size: 16px;
      border: 1px solid #ddd;
      border-radius: 12px;
      outline: none;
      transition: 0.2s ease;
    }

    input:focus {
      border-color: #007bff;
      box-shadow: 0 0 0 4px rgba(0,123,255,0.1);
    }

    button {
      border: none;
      border-radius: 12px;
      background: #007bff;
      color: white;
      padding: 14px 24px;
      font-size: 16px;
      cursor: pointer;
      white-space: nowrap;
      transition: 0.2s ease;
    }

    button:hover {
      opacity: 0.9;
    }

    button:active {
      transform: scale(0.98);
    }

    /* Mobile */
    @media (max-width: 480px) {
      .container {
        padding: 16px;
        border-radius: 14px;
      }

      .input-group {
        flex-direction: column;
      }

      input,
      button {
        width: 100%;
      }

      button {
        padding: 16px;
        font-size: 17px;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="input-group">
      <input
        type="text"
        id="urlInput"
        placeholder="Nhập link... ví dụ google.com"
      />
      <button onclick="goToLink()">Go</button>
    </div>
  </div>

  <script>
    function goToLink() {
      let url = document.getElementById("urlInput").value.trim();

      if (!url) {
        alert("Vui lòng nhập link");
        return;
      }

      // Tự thêm https:// nếu thiếu
      if (!/^https?:\/\//i.test(url)) {
        url = "https://" + url;
      }

      window.location.href = url;
    }

    // Nhấn Enter để Go
    document
      .getElementById("urlInput")
      .addEventListener("keydown", function(event) {
        if (event.key === "Enter") {
          goToLink();
        }
      });
  </script>

</body>
</html>
